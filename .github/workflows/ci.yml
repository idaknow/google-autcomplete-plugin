name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  php-lint:
    name: PHP Lint (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ["7.4", "8.0", "8.1", "8.2", "8.3"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Lint plugin PHP files
        run: |
          files=$(find google-autocomplete-plugin -type f -name '*.php')
          if [ -z "$files" ]; then
            echo "No PHP files found to lint."
            exit 1
          fi

          for file in $files; do
            echo "Linting $file"
            php -l "$file"
          done

  phpcs:
    name: PHPCS (WordPress-Core)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install PHPCS + WordPress Coding Standards
        run: |
          composer --no-interaction global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer --no-interaction global require \
            squizlabs/php_codesniffer:^3 \
            wp-coding-standards/wpcs:^3 \
            dealerdirect/phpcodesniffer-composer-installer:^1

          echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"
          echo "$HOME/.config/composer/vendor/bin" >> "$GITHUB_PATH"

      - name: Run PHPCS
        run: phpcs --standard=.phpcs.xml.dist --extensions=php
